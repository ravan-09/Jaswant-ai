<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Smart PDF Viewer | Load via URL Params</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0c10;
    }

    /* landing screen: clean card layout */
    .landing {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #f8fafc 0%, #eef2f5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      z-index: 10000;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(0px);
    }

    .landing.hide {
      display: none;
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 32px 28px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.02);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.5);
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e2b3c, #0f2b3a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .sub {
      color: #2c3e44;
      font-size: 0.95rem;
      margin-bottom: 28px;
      border-bottom: 1px dashed #b9cddc;
      display: inline-block;
      padding-bottom: 6px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 60px;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .mozilla-btn {
      background: #ff6b00;
      color: white;
      border: none;
    }

    .google-btn {
      background: #1a73e8;
      color: white;
    }

    .download-btn {
      background: #0f2b3a;
      color: white;
    }

    .info-badge {
      margin-top: 24px;
      background: #e9edf2;
      border-radius: 40px;
      padding: 12px 20px;
      font-size: 0.8rem;
      color: #1f4e5c;
      font-family: monospace;
      word-break: break-all;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      display: none;
      z-index: 9990;
    }

    /* floating download bubble (draggable, progress ring style) */
    .download-bubble {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #11161c;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35), 0 0 0 3px rgba(255,255,255,0.2);
      transition: box-shadow 0.1s;
      user-select: none;
      touch-action: none;
      backdrop-filter: blur(4px);
    }

    .water-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #00e6b8;
      transition: height 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border-radius: 50%;
      z-index: 0;
    }

    .percent-value {
      position: relative;
      z-index: 3;
      color: white;
      font-weight: 800;
      font-size: 1.3rem;
      text-shadow: 0 1px 2px black;
      background: rgba(0,0,0,0.4);
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      backdrop-filter: blur(3px);
    }

    .bubble-icon {
      font-size: 26px;
    }

    /* error/retry style */
    .err-tooltip {
      font-size: 10px;
    }

    @media (max-width: 540px) {
      .card {
        padding: 24px 20px;
      }
      .btn {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>

<div class="landing" id="landingUI">
  <div class="card">
    <h2>📄 PDF Smart Viewer</h2>
    <div class="sub">Load PDF via URL parameters</div>
    <div class="btn-group">
      <button class="btn mozilla-btn" id="mozillaViewBtn">
        🦊 Mozilla PDF.js Viewer
      </button>
      <button class="btn google-btn" id="googleViewBtn">
        🌐 Google Docs Viewer
      </button>
      <button class="btn download-btn" id="directDownloadBtn">
        ⬇️ Direct Download PDF
      </button>
    </div>
    <div class="info-badge" id="paramInfo">
      📍 Reading parameters: <span id="paramDetails">—</span>
    </div>
  </div>
</div>

<iframe id="pdfFrame" title="PDF Viewer"></iframe>

<div id="downloadFloat" class="download-bubble">
  <div class="water-fill" id="waterFill"></div>
  <div class="percent-value" id="percentCircle">↓</div>
</div>

<script>
  // --------------------------------------------------------------
  // 1. HELPER: parse URL parameters (supports ?pdf1=...&title=... etc.)
  // We support three distinct modes:
  // ?pdf1=<url>&title=<name>   => Mozilla viewer
  // ?pdf2=<url>&title=<name>   => Google viewer
  // ?pdf3=<url>&title=<name>   => download
  // also legacy direct ?pdfurl=... but we prioritize above.
  // --------------------------------------------------------------
  function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      pdf1: params.get('pdf1'),
      pdf2: params.get('pdf2'),
      pdf3: params.get('pdf3'),
      title: params.get('title'),
      // fallback for generic (if anyone uses old style)
      pdfurl: params.get('pdfurl'),
      legacyTitle: params.get('title')
    };
  }

  let activePDFUrl = null;
  let activeTitle = "Bihar Special Complete Notes";

  // detect which mode is intended based on params (priority: pdf1 > pdf2 > pdf3 > pdfurl)
  function detectModeAndUrl() {
    const params = getQueryParams();
    let mode = null;
    let pdfUrl = null;
    let title = params.title || params.legacyTitle || "Bihar Special Complete Notes";

    if (params.pdf1 && params.pdf1.trim() !== "") {
      mode = "mozilla";
      pdfUrl = params.pdf1.trim();
    } 
    else if (params.pdf2 && params.pdf2.trim() !== "") {
      mode = "google";
      pdfUrl = params.pdf2.trim();
    }
    else if (params.pdf3 && params.pdf3.trim() !== "") {
      mode = "download";
      pdfUrl = params.pdf3.trim();
    }
    else if (params.pdfurl && params.pdfurl.trim() !== "") {
      // generic fallback: treat as mozilla default (safe)
      mode = "mozilla";
      pdfUrl = params.pdfurl.trim();
    }
    else {
      // NO PARAMS? use fallback demo pdf (Bihar Special sample from original, but we keep same reliable URL)
      mode = "mozilla";
      pdfUrl = "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
      title = "Bihar Special Complete Notes (Default)";
    }

    // validate URL
    if (pdfUrl && !pdfUrl.startsWith('http')) {
      // if relative / not secure but we try to make absolute precaution
      if (!pdfUrl.startsWith('//')) pdfUrl = 'https://' + pdfUrl;
    }
    return { mode, pdfUrl, title };
  }

  // UI elements
  const landingDiv = document.getElementById('landingUI');
  const iframeView = document.getElementById('pdfFrame');
  const bubble = document.getElementById('downloadFloat');
  const waterFill = document.getElementById('waterFill');
  const percentCircle = document.getElementById('percentCircle');
  const paramInfoSpan = document.getElementById('paramDetails');

  // current active mode
  let currentMode = null;
  let currentPdfUrl = null;
  let currentTitle = "Document";

  // build Mozilla viewer URL
  function getMozillaViewerUrl(pdfUrl, title) {
    const encodedFile = encodeURIComponent(pdfUrl);
    const viewerBase = "https://mozilla.github.io/pdf.js/web/viewer.html";
    return `${viewerBase}?file=${encodedFile}&title=${encodeURIComponent(title)}`;
  }

  // build Google embedded viewer
  function getGoogleViewerUrl(pdfUrl, title) {
    const encodedUrl = encodeURIComponent(pdfUrl);
    return `https://docs.google.com/viewer?url=${encodedUrl}&embedded=true&hl=en&title=${encodeURIComponent(title)}`;
  }

  // render inside iframe based on mode
  function loadPdfInViewer(mode, pdfUrl, title) {
    if (!pdfUrl) {
      alert("No valid PDF URL provided.");
      return false;
    }
    let finalSrc = "";
    if (mode === "mozilla") {
      finalSrc = getMozillaViewerUrl(pdfUrl, title);
    } else if (mode === "google") {
      finalSrc = getGoogleViewerUrl(pdfUrl, title);
    } else {
      // download mode doesn't show viewer; we trigger download directly
      return false;
    }
    iframeView.src = finalSrc;
    iframeView.style.display = "block";
    landingDiv.classList.add("hide");
    bubble.style.display = "flex";
    return true;
  }

  // ---------- DOWNLOAD LOGIC (with progress bubble) ----------
  async function performDownload(pdfUrl, filename) {
    if (!pdfUrl) {
      alert("No PDF URL to download.");
      return;
    }
    try {
      // reset bubble progress UI
      waterFill.style.height = "0%";
      percentCircle.innerHTML = "0%";
      bubble.style.display = "flex";
      bubble.style.opacity = "1";
      
      const response = await fetch(pdfUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const contentLength = response.headers.get("Content-Length");
      const total = contentLength ? parseInt(contentLength, 10) : null;
      let loaded = 0;
      const reader = response.body.getReader();
      const chunks = [];
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total) {
          let percent = Math.round((loaded / total) * 100);
          percent = Math.min(99, percent);
          waterFill.style.height = percent + "%";
          percentCircle.innerHTML = percent + "%";
        } else {
          // if no content-length, show indefinite progress
          percentCircle.innerHTML = "⬇️";
        }
      }
      
      // completed 100%
      waterFill.style.height = "100%";
      percentCircle.innerHTML = "✓";
      
      const blob = new Blob(chunks, { type: "application/pdf" });
      const blobUrl = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = blobUrl;
      anchor.download = filename.endsWith(".pdf") ? filename : filename + ".pdf";
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(blobUrl);
      
      // after short delay reset bubble text
      setTimeout(() => {
        if (bubble.style.display === "flex") {
          percentCircle.innerHTML = "📄";
          setTimeout(() => {
            waterFill.style.height = "0%";
          }, 800);
        }
      }, 1500);
    } catch (err) {
      console.error("download failed", err);
      percentCircle.innerHTML = "⚠️";
      waterFill.style.height = "30%";
      setTimeout(() => {
        if (bubble.style.display === "flex") percentCircle.innerHTML = "↓";
      }, 2000);
      alert("Download failed. Check network or PDF URL.");
    }
  }

  // generate clean filename from title or URL
  function getFileNameFromTitle(title, pdfUrl) {
    let base = title.replace(/[\\/:*?"<>|]/g, '_').trim();
    if (!base || base.length < 2) base = "document";
    if (!base.endsWith(".pdf")) base = base + ".pdf";
    return base;
  }

  // ********** MAIN EXECUTION based on URL params **********
  function initFromParams() {
    const { mode, pdfUrl, title } = detectModeAndUrl();
    currentMode = mode;
    currentPdfUrl = pdfUrl;
    currentTitle = title || "Bihar Special Notes";
    
    // display param info in landing card for clarity
    let displayText = "";
    if (mode === "mozilla") displayText = `🦊 Mozilla mode | ${currentTitle.substring(0, 40)}`;
    else if (mode === "google") displayText = `🌐 Google mode | ${currentTitle.substring(0, 40)}`;
    else if (mode === "download") displayText = `⬇️ Download mode | ${currentTitle.substring(0, 40)}`;
    else displayText = `📄 PDF ready: ${currentTitle.substring(0, 40)}`;
    paramInfoSpan.innerText = displayText;
    
    // special automatic behavior: 
    // If URL contains pdf1 or pdf2 => auto open that viewer immediately (no need to click)
    // but we also allow manual buttons. For better UX, we auto-load if ?pdf1 or ?pdf2 is present.
    // But we also keep the landing page to allow switching? No, the requirement: "pdf same aise hi open ho, jisme is tarah se pdf khule ?pdf1=...&title=..."
    // means that when these parameters are present, the respective viewer should open directly.
    // However for download mode (?pdf3) we shouldn't open viewer but provide download bubble? Actually spec shows 3 variants.
    // Let's implement: 
    // - if mode is mozilla -> automatically open Mozilla viewer and hide landing
    // - if mode is google -> automatically open Google viewer
    // - if mode is download -> automatically trigger download (and optionally show bubble but keep landing maybe hidden? but requirement: "pdf3 for download" -> we download directly.
    // But we must also keep possibility to re-access via buttons? Yet landing could be hidden. Buttons are secondary.
    // To match "pdf same aise hi open ho" - opening automatically is clean.
    
    if (mode === "mozilla") {
      // auto load mozilla viewer
      loadPdfInViewer("mozilla", currentPdfUrl, currentTitle);
    } 
    else if (mode === "google") {
      loadPdfInViewer("google", currentPdfUrl, currentTitle);
    }
    else if (mode === "download") {
      // download mode: auto trigger download, but we might not show viewer? 
      // The spec says ?pdf3=url&title=xyz -> for download. So we execute download automatically.
      // Also we might keep landing hidden? Actually for download we don't need viewer, but we can show landing info and start download.
      // Better: auto trigger download but keep landing visible? But user expects immediate download. We will trigger download and keep landing visible, but bubble appears.
      landingDiv.classList.remove("hide"); // keep visible but download starts
      bubble.style.display = "flex";
      const fileName = getFileNameFromTitle(currentTitle, currentPdfUrl);
      performDownload(currentPdfUrl, fileName);
    }
    else {
      // fallback: no recognized param -> show manual mode, landing stays
      // but we still display default pdf info
      currentPdfUrl = "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
      currentTitle = "Bihar Special Complete Notes";
      paramInfoSpan.innerText = "📖 Default Demo PDF (click any viewer)";
    }
  }
  
  // ---- Button Event Listeners (manual override, even after auto load, user can still switch)
  document.getElementById("mozillaViewBtn").addEventListener("click", () => {
    let pdf = currentPdfUrl;
    let title = currentTitle;
    if (!pdf) {
      const params = getQueryParams();
      pdf = params.pdf1 || params.pdfurl || "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
      title = params.title || "Bihar Special Notes";
    }
    loadPdfInViewer("mozilla", pdf, title);
    currentMode = "mozilla";
    currentPdfUrl = pdf;
    currentTitle = title;
  });
  
  document.getElementById("googleViewBtn").addEventListener("click", () => {
    let pdf = currentPdfUrl;
    let title = currentTitle;
    if (!pdf) {
      const params = getQueryParams();
      pdf = params.pdf2 || params.pdfurl || "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
      title = params.title || "Bihar Special Notes";
    }
    loadPdfInViewer("google", pdf, title);
    currentMode = "google";
    currentPdfUrl = pdf;
    currentTitle = title;
  });
  
  document.getElementById("directDownloadBtn").addEventListener("click", () => {
    let pdf = currentPdfUrl;
    let title = currentTitle;
    if (!pdf) {
      const params = getQueryParams();
      pdf = params.pdf3 || params.pdfurl || "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
      title = params.title || "Bihar Special Notes";
      if (!pdf) pdf = "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
    }
    const fileName = getFileNameFromTitle(title, pdf);
    performDownload(pdf, fileName);
    // optionally keep viewer if hidden? but no iframe needed.
    if (iframeView.style.display === "block") {
      // don't interfere
    } else {
      // keep landing
    }
  });
  
  // ----- DRAGGABLE BUBBLE (touch + mouse) improved -----
  const dragBubble = document.getElementById("downloadFloat");
  let isDragging = false;
  let startDragX = 0, startDragY = 0;
  let initialLeft = 0, initialTop = 0;
  let initialRight = 0, initialBottom = 0;
  let dragStarted = false;
  
  function getPositionStyle() {
    const rect = dragBubble.getBoundingClientRect();
    const parentRect = document.documentElement.getBoundingClientRect();
    return {
      left: rect.left,
      top: rect.top,
      right: parentRect.width - rect.right,
      bottom: parentRect.height - rect.bottom
    };
  }
  
  function onDragStart(e) {
    e.preventDefault();
    isDragging = true;
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    startDragX = clientX;
    startDragY = clientY;
    const rect = dragBubble.getBoundingClientRect();
    initialLeft = rect.left;
    initialTop = rect.top;
    dragBubble.style.right = 'auto';
    dragBubble.style.bottom = 'auto';
    dragBubble.style.left = initialLeft + 'px';
    dragBubble.style.top = initialTop + 'px';
    dragStarted = true;
  }
  
  function onDragMove(e) {
    if (!isDragging || !dragStarted) return;
    e.preventDefault();
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    const dx = clientX - startDragX;
    const dy = clientY - startDragY;
    let newLeft = initialLeft + dx;
    let newTop = initialTop + dy;
    const maxX = window.innerWidth - dragBubble.offsetWidth;
    const maxY = window.innerHeight - dragBubble.offsetHeight;
    newLeft = Math.min(Math.max(0, newLeft), maxX);
    newTop = Math.min(Math.max(0, newTop), maxY);
    dragBubble.style.left = newLeft + 'px';
    dragBubble.style.top = newTop + 'px';
  }
  
  function onDragEnd(e) {
    isDragging = false;
    dragStarted = false;
  }
  
  dragBubble.addEventListener('mousedown', onDragStart);
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);
  dragBubble.addEventListener('touchstart', onDragStart, {passive: false});
  window.addEventListener('touchmove', onDragMove, {passive: false});
  window.addEventListener('touchend', onDragEnd);
  
  // bubble click triggers download (if viewer mode active)
  bubble.addEventListener('click', (e) => {
    // prevent if draggable click fire immediate (small threshold)
    if (dragStarted && isDragging) return;
    // else trigger download using current pdf url and title
    let targetPdf = currentPdfUrl;
    let targetTitle = currentTitle;
    if (!targetPdf) {
      const params = getQueryParams();
      targetPdf = params.pdf1 || params.pdf2 || params.pdf3 || params.pdfurl || "https://kgs-v2.akamaized.net/kgs/kgs/pdfs/052df459-0632-4739-a802-0573c7cb62d3.pdf";
      targetTitle = params.title || "Bihar Special Notes";
    }
    const fileName = getFileNameFromTitle(targetTitle, targetPdf);
    performDownload(targetPdf, fileName);
  });
  
  // if we are in viewer mode and bubble not shown, but download bubble will appear when viewer opened.
  // ensure that resetting bubble if needed
  window.addEventListener('resize', () => {
    if (dragBubble.style.left && !isDragging) {
      const maxX = window.innerWidth - dragBubble.offsetWidth;
      const maxY = window.innerHeight - dragBubble.offsetHeight;
      let left = parseFloat(dragBubble.style.left);
      let top = parseFloat(dragBubble.style.top);
      if (left > maxX) dragBubble.style.left = maxX + 'px';
      if (top > maxY) dragBubble.style.top = maxY + 'px';
      if (left < 0) dragBubble.style.left = '0px';
      if (top < 0) dragBubble.style.top = '0px';
    }
  });
  
  // Initialize everything
  initFromParams();
  
  // additional: ensure that if viewer is closed? no native back, but landing might reappear ?
  // we provide a hidden way to go back but nice: you can refresh page but it's fine.
  // Also for download mode we might hide iframe if needed
  if (currentMode === "download") {
    iframeView.style.display = "none";
  }
  
  // style water fill border radius
  waterFill.style.borderRadius = "50%";
</script>

</body>
</html>
